services:
  etcd:
  # docker pull bitnamilegacy/etcd:3.6.4-debian-12-r4
    image: bitnamilegacy/etcd:3.6.4-debian-12-r4
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  etcd_data:
  qdrant_data:
