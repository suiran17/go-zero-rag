apiVersion: v1
kind: ConfigMap
metadata:
  name: docservice-config
  namespace: rag
data:
  doc.yaml: |
    Name: doc.rpc
    ListenOn: 0.0.0.0:8080
    Etcd:
      Hosts:
        - etcd.rag.svc.cluster.local:2379
      Key: doc.rpc
    QwenApiKey: ${QWEN_API_KEY}
    QdrantAddr: http://qdrant.rag.svc.cluster.local:6333

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiservice-config
  namespace: rag
data:
  ai.yaml: |
    Name: ai.rpc
    ListenOn: 0.0.0.0:8081
    Etcd:
      Hosts:
        - etcd.rag.svc.cluster.local:2379
      Key: ai.rpc
    QwenApiKey: ${QWEN_API_KEY}
    QdrantAddr: http://qdrant.rag.svc.cluster.local:6333
    LLMModel: qwen-plus

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: rag
data:
  gateway.yaml: |
    Name: gateway
    Host: 0.0.0.0
    Port: 8888
    DocRpc:
      Etcd:
        Hosts:
          - etcd.rag.svc.cluster.local:2379
        Key: doc.rpc
    AiRpc:
      Etcd:
        Hosts:
          - etcd.rag.svc.cluster.local:2379
        Key: ai.rpc
