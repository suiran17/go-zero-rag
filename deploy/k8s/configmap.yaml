apiVersion: v1
kind: ConfigMap
metadata:
  name: docservice-config
  namespace: rag
data:
  doc.yaml: |
    Name: doc.rpc
    ListenOn: 0.0.0.0:8080
    Etcd:
      Hosts:
        - etcd.rag.svc.cluster.local:2379
      Key: doc.rpc
    QdrantAddr: http://qdrant.rag.svc.cluster.local:6333
    VectorSize: 1024
    EmbedBaseURL: http://your-embedding-host:1234/v1  # 改为集群 Pod 可达的地址，勿用 localhost
    EmbedModel: bge-m3
    EmbedApiKey: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiservice-config
  namespace: rag
data:
  ai.yaml: |
    Name: ai.rpc
    ListenOn: 0.0.0.0:8081
    Etcd:
      Hosts:
        - etcd.rag.svc.cluster.local:2379
      Key: ai.rpc
    QdrantAddr: http://qdrant.rag.svc.cluster.local:6333
    VectorSize: 1024
    EmbedBaseURL: http://your-embedding-host:1234/v1  # 改为集群 Pod 可达的地址，勿用 localhost
    EmbedModel: bge-m3
    EmbedApiKey: ""
    LLMBaseURL: https://api.deepseek.com/v1
    LLMModel: deepseek-chat
    LLMApiKey: ${DEEPSEEK_API_KEY}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: rag
data:
  gateway.yaml: |
    Name: gateway
    Host: 0.0.0.0
    Port: 8888
    DocRpc:
      Etcd:
        Hosts:
          - etcd.rag.svc.cluster.local:2379
        Key: doc.rpc
    AiRpc:
      Etcd:
        Hosts:
          - etcd.rag.svc.cluster.local:2379
        Key: ai.rpc
